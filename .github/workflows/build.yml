name: Build EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: Reelvas-Windows
            dist_cmd: npx electron-builder --win --x64 --publish never
            setup_pattern: dist/*.exe
            portable_dir: dist/win-unpacked/
          - os: macos-latest
            name: macOS
            artifact: Reelvas-macOS
            dist_cmd: npx electron-builder --mac --x64 --arm64 --publish never
            setup_pattern: dist/*.dmg
            portable_dir: dist/mac*/
          - os: ubuntu-latest
            name: Linux
            artifact: Reelvas-Linux
            dist_cmd: npx electron-builder --linux --x64 --publish never
            setup_pattern: dist/*.AppImage
            portable_dir: dist/linux-unpacked/

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.1-0 libxss1

      - name: Install dependencies
        run: npm ci

      - name: Build (skip vendor, uses pre-built)
        run: npm run build:ci

      - name: Package ${{ matrix.name }}
        run: ${{ matrix.dist_cmd }}

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-portable
          path: ${{ matrix.portable_dir }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-Setup
          path: ${{ matrix.setup_pattern }}
