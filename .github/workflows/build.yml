name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: Reelvas-Windows
            dist_cmd: npx electron-builder --win --x64 --publish never
            setup_pattern: dist/*.exe
            portable_dir: dist/win-unpacked/
          - os: macos-latest
            name: macOS
            artifact: Reelvas-macOS
            dist_cmd: npx electron-builder --mac --x64 --arm64 --publish never
            setup_pattern: dist/*.dmg
            portable_dir: dist/mac*/
          - os: ubuntu-latest
            name: Linux
            artifact: Reelvas-Linux
            dist_cmd: npx electron-builder --linux --x64 --publish never
            setup_pattern: dist/*.AppImage
            portable_dir: dist/linux-unpacked/

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.1-0 libxss1

      - run: npm ci
      - run: npm run build:ci
      - run: ${{ matrix.dist_cmd }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.setup_pattern }}
            ${{ matrix.portable_dir }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Reelvas-Windows
          path: Reelvas-Windows

      - uses: actions/download-artifact@v4
        with:
          name: Reelvas-macOS
          path: Reelvas-macOS

      - uses: actions/download-artifact@v4
        with:
          name: Reelvas-Linux
          path: Reelvas-Linux

      - name: Zip each platform
        run: |
          zip -r Reelvas-Windows.zip Reelvas-Windows/
          zip -r Reelvas-macOS.zip Reelvas-macOS/
          zip -r Reelvas-Linux.zip Reelvas-Linux/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            Reelvas-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
