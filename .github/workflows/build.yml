name: Build EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package EXE
        run: npm run dist

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: Reelvas-portable
          path: dist/win-unpacked/

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Reelvas-Setup
          path: dist/*.exe
